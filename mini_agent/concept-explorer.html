<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #1f6feb;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
#app {
  display: grid;
  grid-template-columns: 280px 1fr 360px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}
header {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
}
header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
header .stats { font-size: 12px; color: var(--text-dim); }
#sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
}
#sidebar h2 {
  font-size: 12px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
.concept-item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.15s;
}
.concept-item:hover { background: rgba(88, 166, 255, 0.1); }
.concept-item.active { background: rgba(88, 166, 255, 0.15); border-left: 2px solid var(--accent); }
.concept-item .name { font-size: 14px; font-weight: 500; }
.concept-item .purpose { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.concept-item .badges { display: flex; gap: 6px; margin-top: 4px; }
.badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--bg);
  color: var(--text-dim);
}
#main {
  overflow: hidden;
  position: relative;
}
#graph-container {
  width: 100%;
  height: 100%;
}
#graph-container svg { width: 100%; height: 100%; }
.view-toggle {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  gap: 4px;
  z-index: 10;
}
.view-toggle button {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.view-toggle button:hover { color: var(--text); border-color: var(--accent); }
.view-toggle button.active { background: var(--accent-dim); color: #fff; border-color: var(--accent); }
#mermaid-view {
  width: 100%;
  height: 100%;
  overflow: auto;
  display: none;
  padding: 24px;
}
#mermaid-view .mermaid-render {
  background: var(--surface);
  border-radius: 8px;
  padding: 24px;
  min-height: 200px;
}
#detail {
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
}
#detail h2 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent);
}
#detail .empty-state {
  color: var(--text-dim);
  font-size: 13px;
  text-align: center;
  margin-top: 40px;
}
.detail-section {
  margin-bottom: 16px;
}
.detail-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.detail-section .purpose-text {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
}
.state-item, .action-item, .sync-item {
  padding: 6px 8px;
  margin-bottom: 4px;
  border-radius: 4px;
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  background: var(--bg);
  cursor: pointer;
  transition: background 0.15s;
}
.state-item:hover, .action-item:hover, .sync-item:hover {
  background: rgba(88, 166, 255, 0.1);
}
.action-item.highlighted {
  background: rgba(63, 185, 80, 0.15);
  border-left: 2px solid var(--green);
}
.sync-item {
  border-left: 2px solid var(--purple);
}
.action-params { color: var(--text-dim); }
.action-clauses {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
  padding-left: 8px;
}
.sync-chain {
  background: var(--bg);
  border-radius: 6px;
  padding: 12px;
  margin-top: 8px;
}
.sync-chain h4 {
  font-size: 11px;
  color: var(--orange);
  margin-bottom: 8px;
}
.sync-chain-item {
  font-size: 12px;
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sync-chain-item .arrow { color: var(--purple); }
.sync-chain-item .concept-link {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
}
.sync-chain-item .concept-link:hover { color: #fff; }
/* D3 graph styles */
.node circle {
  stroke-width: 2px;
  cursor: pointer;
  transition: r 0.15s;
}
.node text {
  font-size: 12px;
  fill: var(--text);
  pointer-events: none;
}
.node.external circle { stroke-dasharray: 4; }
.link {
  fill: none;
  stroke-width: 1.5px;
}
.link.param { stroke: var(--text-dim); }
.link.sync { stroke: var(--purple); stroke-dasharray: 6 3; }
.link-label {
  font-size: 10px;
  fill: var(--text-dim);
}
marker { fill: var(--text-dim); }
marker.sync-marker { fill: var(--purple); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Concept Explorer</h1>
    <span class="stats" id="stats"></span>
  </header>
  <div id="sidebar">
    <h2>Concepts</h2>
    <div id="concept-list"></div>
  </div>
  <div id="main">
    <div class="view-toggle">
      <button id="btn-graph" class="active" onclick="setView('graph')">Graph</button>
      <button id="btn-state" onclick="setView('state')">State Machine</button>
      <button id="btn-entity" onclick="setView('entity')">Entity Diagram</button>
      <button id="btn-deps" onclick="setView('deps')">Dependencies</button>
    </div>
    <div id="graph-container"></div>
    <div id="mermaid-view"><div class="mermaid-render" id="mermaid-render"></div></div>
  </div>
  <div id="detail">
    <div class="empty-state">Select a concept to explore</div>
  </div>
</div>

<script>
// Embedded concept data
const CONCEPTS = {
  "AgentLoop": {
    "name": "AgentLoop",
    "params": [
      "MaxSteps"
    ],
    "purpose": "Drive a bounded think-act-observe cycle to completion, tracking progress against a step limit.",
    "state": [
      {
        "name": "status",
        "type_expr": "one Status"
      },
      {
        "name": "step_count",
        "type_expr": "one Int"
      },
      {
        "name": "max_steps",
        "type_expr": "one Int"
      }
    ],
    "actions": [
      {
        "name": "begin",
        "params": [
          "limit: MaxSteps"
        ],
        "pre": {
          "clauses": [
            "status = idle"
          ]
        },
        "post": {
          "clauses": [
            "status = thinking; step_count = 0; max_steps = limit"
          ]
        }
      },
      {
        "name": "think",
        "params": [],
        "pre": {
          "clauses": [
            "status = thinking"
          ]
        },
        "post": {
          "clauses": [
            "status = acting"
          ]
        }
      },
      {
        "name": "act",
        "params": [],
        "pre": {
          "clauses": [
            "status = acting"
          ]
        },
        "post": {
          "clauses": [
            "step_count += 1; status = observing"
          ]
        }
      },
      {
        "name": "observe",
        "params": [],
        "pre": {
          "clauses": [
            "status = observing"
          ]
        },
        "post": {
          "clauses": [
            "status = thinking"
          ]
        }
      },
      {
        "name": "complete",
        "params": [],
        "pre": {
          "clauses": [
            "status = acting"
          ]
        },
        "post": {
          "clauses": [
            "status = done"
          ]
        }
      },
      {
        "name": "cancel",
        "params": [],
        "pre": {
          "clauses": [
            "status != idle and status != done"
          ]
        },
        "post": {
          "clauses": [
            "status = cancelled"
          ]
        }
      },
      {
        "name": "exhaust",
        "params": [],
        "pre": {
          "clauses": [
            "status = thinking and step_count >= max_steps"
          ]
        },
        "post": {
          "clauses": [
            "status = errored"
          ]
        }
      },
      {
        "name": "propose_plan",
        "params": [],
        "pre": {
          "clauses": [
            "status = acting"
          ]
        },
        "post": {
          "clauses": [
            "status = plan_pending"
          ]
        }
      },
      {
        "name": "approve_plan",
        "params": [],
        "pre": {
          "clauses": [
            "status = plan_pending"
          ]
        },
        "post": {
          "clauses": [
            "status = observing"
          ]
        }
      },
      {
        "name": "reject_plan",
        "params": [],
        "pre": {
          "clauses": [
            "status = plan_pending"
          ]
        },
        "post": {
          "clauses": [
            "status = thinking"
          ]
        }
      }
    ],
    "sync": []
  },
  "Configuration": {
    "name": "Configuration",
    "params": [],
    "purpose": "Resolve agent settings from a hierarchy of configuration layers where later layers override earlier ones.",
    "state": [
      {
        "name": "layers",
        "type_expr": "set Layer"
      },
      {
        "name": "global_layer",
        "type_expr": "layers"
      },
      {
        "name": "project_layer",
        "type_expr": "layers"
      },
      {
        "name": "cli_layer",
        "type_expr": "layers"
      },
      {
        "name": "priority",
        "type_expr": "layers -> one Int"
      },
      {
        "name": "settings",
        "type_expr": "layers -> set Setting"
      },
      {
        "name": "resolved",
        "type_expr": "set Setting"
      },
      {
        "name": "key",
        "type_expr": "Setting -> one String"
      },
      {
        "name": "value",
        "type_expr": "Setting -> one Value"
      }
    ],
    "actions": [
      {
        "name": "load_layer",
        "params": [
          "l: Layer",
          "p: Int",
          "entries: set Setting"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "layers += l; priority(l) = p; settings(l) = entries"
          ]
        }
      },
      {
        "name": "resolve",
        "params": [],
        "pre": null,
        "post": {
          "clauses": [
            "for each key across all layers, resolved contains the setting from the highest-priority layer"
          ]
        }
      },
      {
        "name": "override",
        "params": [
          "k: String",
          "v: Value"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "resolved setting for k updated to v"
          ]
        }
      }
    ],
    "sync": []
  },
  "ContextBudget": {
    "name": "ContextBudget",
    "params": [
      "Window",
      "Threshold"
    ],
    "purpose": "Monitor conversation size against a context window and trigger compaction when the threshold is crossed.",
    "state": [
      {
        "name": "usage",
        "type_expr": "one Int"
      },
      {
        "name": "window",
        "type_expr": "one Int"
      },
      {
        "name": "threshold",
        "type_expr": "one Int"
      },
      {
        "name": "needs_compaction",
        "type_expr": "one Bool"
      }
    ],
    "actions": [
      {
        "name": "init",
        "params": [
          "w: Window",
          "t: Threshold"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "window = w; threshold = t; usage = 0; needs_compaction = false"
          ]
        }
      },
      {
        "name": "record_growth",
        "params": [
          "tokens: Int"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "usage += tokens; needs_compaction = (usage >= threshold)"
          ]
        }
      },
      {
        "name": "record_shrink",
        "params": [
          "tokens: Int"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "usage -= tokens; needs_compaction = (usage >= threshold)"
          ]
        }
      },
      {
        "name": "compact",
        "params": [],
        "pre": {
          "clauses": [
            "needs_compaction = true"
          ]
        },
        "post": {
          "clauses": [
            "needs_compaction = false"
          ]
        }
      },
      {
        "name": "reset",
        "params": [],
        "pre": null,
        "post": {
          "clauses": [
            "usage = 0; needs_compaction = false"
          ]
        }
      }
    ],
    "sync": [
      {
        "trigger_concept": "MessageLog",
        "trigger_action": "clear",
        "trigger_params": [],
        "trigger_result": null,
        "where_clauses": [],
        "invocations": [
          {
            "action": "reset",
            "params": []
          }
        ]
      }
    ]
  },
  "Memory": {
    "name": "Memory",
    "params": [
      "MemoryDir"
    ],
    "purpose": "Persist durable cross-session knowledge as indexed files, updated by a consolidation pass after each session.",
    "state": [
      {
        "name": "memories",
        "type_expr": "set MemoryFile"
      },
      {
        "name": "active",
        "type_expr": "memories"
      },
      {
        "name": "deleted",
        "type_expr": "memories"
      },
      {
        "name": "name",
        "type_expr": "memories -> one String"
      },
      {
        "name": "description",
        "type_expr": "memories -> one String"
      },
      {
        "name": "mem_type",
        "type_expr": "memories -> one MemType"
      },
      {
        "name": "content",
        "type_expr": "memories -> one String"
      }
    ],
    "actions": [
      {
        "name": "dream",
        "params": [
          "transcript: String"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "produces a set of create/update/delete operations from transcript; applies them"
          ]
        }
      },
      {
        "name": "create_memory",
        "params": [
          "m: MemoryFile",
          "n: String",
          "desc: String",
          "t: MemType",
          "c: String"
        ],
        "pre": {
          "clauses": [
            "no m' in active where name(m') = n"
          ]
        },
        "post": {
          "clauses": [
            "memories += m; active += m; name(m) = n; description(m) = desc; mem_type(m) = t; content(m) = c"
          ]
        }
      },
      {
        "name": "update_memory",
        "params": [
          "m: MemoryFile",
          "c: String"
        ],
        "pre": {
          "clauses": [
            "m in active"
          ]
        },
        "post": {
          "clauses": [
            "content(m) = c"
          ]
        }
      },
      {
        "name": "delete_memory",
        "params": [
          "m: MemoryFile"
        ],
        "pre": {
          "clauses": [
            "m in active"
          ]
        },
        "post": {
          "clauses": [
            "active -= m; deleted += m"
          ]
        }
      },
      {
        "name": "rebuild_index",
        "params": [],
        "pre": null,
        "post": {
          "clauses": [
            "index file regenerated from name and description of all active memories"
          ]
        }
      }
    ],
    "sync": [
      {
        "trigger_concept": "Session",
        "trigger_action": "end",
        "trigger_params": [
          "s",
          "reason"
        ],
        "trigger_result": null,
        "where_clauses": [],
        "invocations": [
          {
            "action": "dream",
            "params": [
              "s.transcript"
            ]
          },
          {
            "action": "rebuild_index",
            "params": []
          }
        ]
      }
    ]
  },
  "MessageLog": {
    "name": "MessageLog",
    "params": [],
    "purpose": "Maintain an ordered, append-only history of conversation messages partitioned by role.",
    "state": [
      {
        "name": "messages",
        "type_expr": "set Message"
      },
      {
        "name": "system_msgs",
        "type_expr": "messages"
      },
      {
        "name": "user_msgs",
        "type_expr": "messages"
      },
      {
        "name": "assistant_msgs",
        "type_expr": "messages"
      },
      {
        "name": "tool_msgs",
        "type_expr": "messages"
      },
      {
        "name": "role",
        "type_expr": "messages -> one Role"
      },
      {
        "name": "content",
        "type_expr": "messages -> one String"
      },
      {
        "name": "ordering",
        "type_expr": "messages -> one Int"
      }
    ],
    "actions": [
      {
        "name": "init",
        "params": [
          "m: Message",
          "prompt: String"
        ],
        "pre": {
          "clauses": [
            "messages is empty"
          ]
        },
        "post": {
          "clauses": [
            "messages += m; system_msgs += m; role(m) = system; content(m) = prompt; ordering(m) = 0"
          ]
        }
      },
      {
        "name": "append_user",
        "params": [
          "m: Message",
          "text: String"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "messages += m; user_msgs += m; role(m) = user; content(m) = text; ordering(m) = |messages|"
          ]
        }
      },
      {
        "name": "append_assistant",
        "params": [
          "m: Message",
          "text: String"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "messages += m; assistant_msgs += m; role(m) = assistant; content(m) = text; ordering(m) = |messages|"
          ]
        }
      },
      {
        "name": "append_tool_result",
        "params": [
          "m: Message",
          "output: String"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "messages += m; tool_msgs += m; role(m) = tool; content(m) = output; ordering(m) = |messages|"
          ]
        }
      },
      {
        "name": "replace_prefix",
        "params": [
          "old_msgs: set Message",
          "summary: Message"
        ],
        "pre": {
          "clauses": [
            "old_msgs subset of messages and system_msgs not in old_msgs"
          ]
        },
        "post": {
          "clauses": [
            "messages -= old_msgs; messages += summary; ordering adjusted"
          ]
        }
      },
      {
        "name": "clear",
        "params": [],
        "pre": null,
        "post": {
          "clauses": [
            "messages = system_msgs"
          ]
        }
      },
      {
        "name": "fork",
        "params": [
          "keep_count: Int"
        ],
        "pre": {
          "clauses": [
            "keep_count <= |messages|"
          ]
        },
        "post": {
          "clauses": [
            "returns copy of messages up to keep_count"
          ]
        }
      }
    ],
    "sync": []
  },
  "Permission": {
    "name": "Permission",
    "params": [
      "Mode"
    ],
    "purpose": "Decide whether a tool call should be allowed, denied, or gated for user approval based on a layered rule system and permission mode.",
    "state": [
      {
        "name": "rules",
        "type_expr": "set Rule"
      },
      {
        "name": "global_rules",
        "type_expr": "rules"
      },
      {
        "name": "project_rules",
        "type_expr": "rules"
      },
      {
        "name": "decisions",
        "type_expr": "set Decision"
      },
      {
        "name": "allowed",
        "type_expr": "decisions"
      },
      {
        "name": "denied",
        "type_expr": "decisions"
      },
      {
        "name": "gated",
        "type_expr": "decisions"
      },
      {
        "name": "tool_pattern",
        "type_expr": "rules -> one String"
      },
      {
        "name": "action",
        "type_expr": "rules -> one Action"
      },
      {
        "name": "arg_constraints",
        "type_expr": "rules -> set Constraint"
      }
    ],
    "actions": [
      {
        "name": "load_global",
        "params": [
          "r: Rule",
          "pattern: String",
          "act: Action"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "rules += r; global_rules += r; tool_pattern(r) = pattern; action(r) = act"
          ]
        }
      },
      {
        "name": "load_project",
        "params": [
          "r: Rule",
          "pattern: String",
          "act: Action"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "rules += r; project_rules += r; tool_pattern(r) = pattern; action(r) = act"
          ]
        }
      },
      {
        "name": "evaluate",
        "params": [
          "tool: String",
          "args: Args",
          "d: Decision"
        ],
        "pre": null,
        "post": {
          "clauses": [
            "decisions += d",
            "if matching rule found in reversed(rules): apply rule action",
            "else if Mode = full_access: allowed += d",
            "else if Mode = readonly and tool is read_only: allowed += d",
            "else if Mode = readonly: denied += d",
            "else if Mode = auto and tool is safe: allowed += d",
            "else: gated += d"
          ]
        }
      },
      {
        "name": "grant",
        "params": [
          "d: Decision"

// --- Sidebar ---
function renderSidebar() {
  const list = document.getElementById('concept-list');
  const names = Object.keys(CONCEPTS).sort();
  document.getElementById('stats').textContent =
    `${names.length} concepts | ${GRAPH.edges.length} dependencies`;

  list.innerHTML = names.map(name => {
    const c = CONCEPTS[name];
    return `
      <div class="concept-item ${selectedConcept === name ? 'active' : ''}"
           onclick="selectConcept('${name}')">
        <div class="name">${name}</div>
        <div class="purpose">${truncate(c.purpose, 60)}</div>
        <div class="badges">
          <span class="badge">${c.actions.length} actions</span>
          <span class="badge">${c.state.length} state</span>
          ${c.sync.length ? `<span class="badge">${c.sync.length} sync</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '...' : s; }

// --- Detail panel ---
function renderDetail(name) {
  const panel = document.getElementById('detail');
  if (!name || !CONCEPTS[name]) {
    panel.innerHTML = '<div class="empty-state">Select a concept to explore</div>';
    return;
  }
  const c = CONCEPTS[name];
  let html = `<h2>${name}</h2>`;

  // Purpose
  html += `<div class="detail-section">
    <h3>Purpose</h3>
    <div class="purpose-text">${c.purpose}</div>
  </div>`;

  // Params
  if (c.params.length) {
    html += `<div class="detail-section">
      <h3>Parameters</h3>
      ${c.params.map(p => `<div class="state-item">${p}</div>`).join('')}
    </div>`;
  }

  // State
  html += `<div class="detail-section">
    <h3>State</h3>
    ${c.state.map(s => `<div class="state-item">${s.name}: ${s.type_expr}</div>`).join('')}
  </div>`;

  // Actions
  html += `<div class="detail-section">
    <h3>Actions</h3>
    ${c.actions.map(a => {
      const key = `${name}.${a.name}`;
      const syncs = SYNC_INDEX[key] || [];
      const hasSyncs = syncs.length > 0;
      const isHighlighted = highlightedAction === key;
      return `
        <div class="action-item ${isHighlighted ? 'highlighted' : ''}"
             onclick="highlightAction('${key}')">
          <div>
            <strong>${a.name}</strong><span class="action-params">(${a.params.join(', ')})</span>
            ${hasSyncs ? ` <span class="badge" style="background:rgba(188,140,255,0.2);color:var(--purple);">${syncs.length} sync</span>` : ''}
          </div>
          ${a.pre ? `<div class="action-clauses">pre: ${a.pre.clauses.join(', ')}</div>` : ''}
          ${a.post ? `<div class="action-clauses">post: ${a.post.clauses.join(', ')}</div>` : ''}
        </div>`;
    }).join('')}
  </div>`;

  // Sync (this concept reacts to)
  if (c.sync.length) {
    html += `<div class="detail-section">
      <h3>Sync (reacts to)</h3>
      ${c.sync.map(s => `
        <div class="sync-item" onclick="selectConcept('${s.trigger_concept}')">
          when <span class="concept-link">${s.trigger_concept}</span>.${s.trigger_action}(${s.trigger_params.join(', ')})${s.trigger_result ? ' → ' + s.trigger_result : ''}
          ${s.where_clauses && s.where_clauses.length ? '<br>&nbsp;&nbsp;where ' + s.where_clauses.join(', ') : ''}
          <br>&nbsp;&nbsp;then ${s.invocations.map(i => i.action + '(' + i.params.join(', ') + ')').join(', ')}
        </div>`).join('')}
    </div>`;
  }

  // Sync chain (when an action is highlighted)
  if (highlightedAction) {
    const syncs = SYNC_INDEX[highlightedAction] || [];
    if (syncs.length > 0) {
      html += `<div class="sync-chain">
        <h4>Sync chain: ${highlightedAction}</h4>
        ${syncs.map(s => `
          <div class="sync-chain-item">
            <span class="arrow">→</span>
            <span class="concept-link" onclick="selectConcept('${s.reactor}')">${s.reactor}</span>.${s.local_action}(${s.local_params.join(', ')})
          </div>`).join('')}
      </div>`;

      // Trace deeper: do the local_actions themselves trigger further syncs?
      const deeper = [];
      for (const s of syncs) {
        const nextKey = `${s.reactor}.${s.local_action}`;
        const nextSyncs = SYNC_INDEX[nextKey] || [];
        for (const ns of nextSyncs) {
          deeper.push({ from: s.reactor, action: s.local_action, ...ns });
        }
      }
      if (deeper.length) {
        html += `<div class="sync-chain">
          <h4>Cascading syncs</h4>
          ${deeper.map(d => `
            <div class="sync-chain-item">
              <span class="arrow">→→</span>
              ${d.from}.${d.action} triggers
              <span class="concept-link" onclick="selectConcept('${d.reactor}')">${d.reactor}</span>.${d.local_action}
            </div>`).join('')}
        </div>`;
      }
    }
  }

  panel.innerHTML = html;
}

  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select(container).append('svg')
    .attr('width', width)
    .attr('height', height);

  // Arrow markers
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#8b949e');

  defs.append('marker')
    .attr('id', 'arrow-sync')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#bc8cff');

  // Force simulation
  const nodes = GRAPH.nodes.map(d => ({...d}));
  const edges = GRAPH.edges.map(d => ({...d}));

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(40));

  const link = svg.append('g').selectAll('line')
    .data(edges).enter().append('line')
    .attr('class', d => `link ${d.type}`)
    .attr('marker-end', d => d.type === 'sync' ? 'url(#arrow-sync)' : 'url(#arrow)');

  const linkLabel = svg.append('g').selectAll('text')
    .data(edges.filter(d => d.type === 'sync')).enter().append('text')
    .attr('class', 'link-label')
    .text('sync');

  const node = svg.append('g').selectAll('g')
    .data(nodes).enter().append('g')
    .attr('class', d => `node ${d.external ? 'external' : ''}`)
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  node.append('circle')
    .attr('r', d => d.external ? 14 : 22)
    .attr('fill', d => {
      if (d.external) return '#21262d';
      if (selectedConcept === d.id) return '#1f6feb';
      return '#161b22';
    })
    .attr('stroke', d => {
      if (d.external) return '#484f58';
      if (selectedConcept === d.id) return '#58a6ff';
      return '#58a6ff';
    });

  node.append('text')
    .attr('dy', d => d.external ? -20 : -28)
    .attr('text-anchor', 'middle')
    .text(d => d.id);

  // Action count inside circle for internal concepts
  node.filter(d => !d.external).append('text')
    .attr('dy', 4)
    .attr('text-anchor', 'middle')
    .attr('font-size', '10px')
    .attr('fill', '#8b949e')
    .text(d => d.actionCount ? `${d.actionCount}a` : '');

  node.on('click', (event, d) => {
    if (!d.external) selectConcept(d.id);
  });

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    linkLabel
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);

    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }
  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }
  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }
}

// --- Mermaid rendering ---
async function renderMermaid(code, elementId) {
  const el = document.getElementById(elementId);
  try {
    const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), code);
    el.innerHTML = svg;
  } catch (e) {
    el.innerHTML = `<pre style="color:var(--red)">${e.message}\n\n${code}</pre>`;
  }
}

// --- View switching ---
function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));

  const graphEl = document.getElementById('graph-container');
  const mermaidEl = document.getElementById('mermaid-view');

  if (view === 'graph') {
    document.getElementById('btn-graph').classList.add('active');
    graphEl.style.display = '';
    mermaidEl.style.display = 'none';
  } else if (view === 'state' && selectedConcept && MERMAID[selectedConcept]) {
    document.getElementById('btn-state').classList.add('active');
    graphEl.style.display = 'none';
    mermaidEl.style.display = '';
    renderMermaid(MERMAID[selectedConcept].state_machine, 'mermaid-render');
  } else if (view === 'entity' && selectedConcept && MERMAID[selectedConcept]) {
    document.getElementById('btn-entity').classList.add('active');
    graphEl.style.display = 'none';
    mermaidEl.style.display = '';
    renderMermaid(MERMAID[selectedConcept].entity_diagram, 'mermaid-render');
  } else if (view === 'deps') {
    document.getElementById('btn-deps').classList.add('active');
    graphEl.style.display = 'none';
    mermaidEl.style.display = '';
    renderMermaid(DEP_GRAPH, 'mermaid-render');
  } else {
    // Fallback to graph if no concept selected for diagram views
    document.getElementById('btn-graph').classList.add('active');
    graphEl.style.display = '';
    mermaidEl.style.display = 'none';
  }
}

// --- Selection ---
function selectConcept(name) {
  selectedConcept = name;
  highlightedAction = null;
  renderSidebar();
  renderDetail(name);
  updateGraphHighlight();
  // If currently in a diagram view, refresh it
  if (currentView === 'state' || currentView === 'entity') {
    setView(currentView);
  }
}

function highlightAction(key) {
  highlightedAction = highlightedAction === key ? null : key;
  renderDetail(selectedConcept);
  updateGraphHighlight();
}

function updateGraphHighlight() {
  d3.selectAll('.node circle')
    .attr('fill', d => {
      if (d.external) return '#21262d';
      if (selectedConcept === d.id) return '#1f6feb';
      return '#161b22';
    })
    .attr('stroke', d => {
      if (d.external) return '#484f58';
      if (selectedConcept === d.id) return '#58a6ff';
      // Highlight sync-connected concepts
      if (highlightedAction) {
        const syncs = SYNC_INDEX[highlightedAction] || [];
        if (syncs.some(s => s.reactor === d.id)) return '#3fb950';
      }
      return '#58a6ff';
    })
    .attr('stroke-width', d => {
      if (highlightedAction) {
        const syncs = SYNC_INDEX[highlightedAction] || [];
        if (syncs.some(s => s.reactor === d.id)) return 3;
      }
      return 2;
    });
}

// --- Init ---
renderSidebar();
renderGraph();
</script>
